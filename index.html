<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Malote Digital PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        body { background-color: #f3f4f6; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        #reader { width: 100%; border-radius: 0.75rem; overflow: hidden; border: 2px solid #e5e7eb; background: #000; }
        #reader video { object-fit: cover; }
        #reader__dashboard_section_csr span { display: none !important; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body class="min-h-screen flex flex-col max-w-md mx-auto bg-white shadow-xl">

    <header class="bg-emerald-700 text-white p-4 shadow-md flex items-center gap-3">
        <i class="ph-fill ph-scan text-3xl"></i>
        <div>
            <h1 class="text-xl font-bold leading-tight">Malote Digital PRO</h1>
            <p class="text-emerald-100 text-sm">Leitura e Comprovação (Canhoto)</p>
        </div>
    </header>

    <main class="flex-1 p-4 flex flex-col gap-4 pb-10">
        
        <div id="reader-container" class="relative">
            <div id="reader"></div>
            <div id="scanner-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-100 rounded-xl border-2 border-dashed border-gray-300">
                <i class="ph ph-barcode text-4xl text-gray-400 mb-2"></i>
                <span class="text-gray-500 font-medium">Leitor desligado</span>
            </div>
        </div>

        <div class="flex gap-2">
            <button id="btn-start" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-xl flex items-center justify-center gap-2 shadow-sm">
                <i class="ph ph-barcode text-xl"></i> Ler Código (Nota)
            </button>
            <button id="btn-stop" class="hidden flex-1 bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-4 rounded-xl flex items-center justify-center gap-2 shadow-sm">
                <i class="ph ph-stop text-xl"></i> Parar
            </button>
        </div>

        <div id="result-card" class="hidden flex-col gap-3 mt-2 animate-[fadeIn_0.3s_ease-out]">
            <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 shadow-sm">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-xs text-gray-500 font-semibold uppercase">Número da NF</p>
                        <p id="nf-numero" class="text-2xl font-bold text-gray-800">---</p>
                    </div>
                    <i class="ph-fill ph-check-circle text-2xl text-emerald-500"></i>
                </div>
                <div class="mt-2">
                    <p class="text-xs text-gray-500 font-semibold uppercase">Chave</p>
                    <p id="nf-chave" class="text-xs font-mono text-gray-600 break-all mt-1">---</p>
                </div>
            </div>

            <!-- Seção da Foto do Canhoto -->
            <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 flex flex-col gap-3 shadow-sm">
                <div class="flex items-center gap-2 text-blue-800">
                    <i class="ph-fill ph-camera text-xl"></i>
                    <span class="font-bold text-sm">Comprovante (Opcional)</span>
                </div>
                
                <!-- Input nativo de câmera escondido -->
                <input type="file" accept="image/*" capture="environment" id="input-camera" class="hidden">
                
                <button id="btn-tirar-foto" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg flex items-center justify-center gap-2 shadow-sm text-sm">
                    <i class="ph ph-camera-plus text-lg"></i> Tirar Foto do Canhoto
                </button>

                <!-- Preview da foto tirada -->
                <div id="foto-preview-container" class="hidden relative w-full h-32 rounded-lg overflow-hidden border-2 border-blue-300">
                    <img id="foto-preview" src="" alt="Preview" class="w-full h-full object-cover">
                    <button id="btn-remover-foto" class="absolute top-2 right-2 bg-red-500 text-white p-1 rounded-full shadow-md">
                        <i class="ph ph-x"></i>
                    </button>
                </div>
            </div>

            <!-- Ações -->
            <div class="flex flex-col gap-2 mt-2">
                <button id="btn-sheets" class="w-full bg-[#0F9D58] hover:bg-[#0b8043] text-white font-semibold py-3 px-4 rounded-xl flex items-center justify-center gap-2 shadow-sm text-lg transition-colors">
                    <i class="ph-fill ph-cloud-arrow-up text-xl"></i> Salvar Tudo no Sistema
                </button>
                
                <button id="btn-whatsapp" class="w-full bg-[#25D366] text-white font-semibold py-3 px-4 rounded-xl flex items-center justify-center gap-2 shadow-sm transition-colors">
                    <i class="ph-fill ph-whatsapp-logo text-xl"></i> Avisar Fiscal via WhatsApp
                </button>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // =====================================================================
            // URL DA SUA PLANILHA (WEBHOOK)
            // =====================================================================
            // ATENÇÃO: Se gerou um link novo no Passo 3, atualize-o aqui abaixo:
            const GOOGLE_SHEETS_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbyi40ozL1-QUvJ_qMfif6CNmMduOCTGBsbdGb6EwgONfswFMkC9JfnyIBCQt6f1Sw5e/exec"; 
            // =====================================================================

            let html5QrcodeScanner;
            let currentChave = "";
            let currentNumero = "";
            let currentFotoBase64 = "";

            const btnStart = document.getElementById('btn-start');
            const btnStop = document.getElementById('btn-stop');
            const overlay = document.getElementById('scanner-overlay');
            const resultCard = document.getElementById('result-card');
            
            const txtNumero = document.getElementById('nf-numero');
            const txtChave = document.getElementById('nf-chave');
            
            const btnSheets = document.getElementById('btn-sheets');
            const btnWhatsapp = document.getElementById('btn-whatsapp');

            const inputCamera = document.getElementById('input-camera');
            const btnTirarFoto = document.getElementById('btn-tirar-foto');
            const fotoPreviewContainer = document.getElementById('foto-preview-container');
            const fotoPreview = document.getElementById('foto-preview');
            const btnRemoverFoto = document.getElementById('btn-remover-foto');

            // --- Câmera e Compressão da Foto ---
            btnTirarFoto.addEventListener('click', () => inputCamera.click());

            inputCamera.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                        currentFotoBase64 = canvas.toDataURL('image/jpeg', 0.6);
                        
                        fotoPreview.src = currentFotoBase64;
                        fotoPreviewContainer.classList.remove('hidden');
                        btnTirarFoto.classList.add('hidden');
                    }
                }
            });

            btnRemoverFoto.addEventListener('click', () => {
                currentFotoBase64 = "";
                inputCamera.value = "";
                fotoPreviewContainer.classList.add('hidden');
                btnTirarFoto.classList.remove('hidden');
                btnTirarFoto.classList.add('flex');
            });


            // --- Leitura do Código de Barras ---
            function processaLeitura(codigo) {
                const chave = codigo.replace(/\D/g, ''); 
                if (chave.length === 44) {
                    currentChave = chave;
                    currentNumero = parseInt(chave.substring(25, 34), 10).toString();
                    txtNumero.textContent = currentNumero;
                    txtChave.textContent = chave;
                    
                    btnSheets.disabled = false;
                    btnSheets.classList.remove('bg-gray-400');
                    btnSheets.classList.add('bg-[#0F9D58]', 'hover:bg-[#0b8043]');
                    btnSheets.innerHTML = `<i class="ph-fill ph-cloud-arrow-up text-xl"></i> Salvar Tudo no Sistema`;

                    pararLeitor();
                    resultCard.classList.remove('hidden');
                    resultCard.classList.add('flex');
                    if (navigator.vibrate) navigator.vibrate(200);
                } else {
                    alert("Chave inválida. Lido: " + chave);
                }
            }

            function iniciarLeitor() {
                resultCard.classList.add('hidden');
                resultCard.classList.remove('flex');
                overlay.classList.add('hidden');
                btnStart.classList.add('hidden');
                btnStop.classList.remove('hidden');
                btnStop.classList.add('flex');

                html5QrcodeScanner = new Html5Qrcode("reader");
                html5QrcodeScanner.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 300, height: 100 }, formatsToSupport: [ Html5QrcodeSupportedFormats.CODE_128 ] },
                    (decodedText) => processaLeitura(decodedText),
                    (err) => {}
                ).catch(err => { alert("Erro na câmera: " + err); pararLeitor(); });
            }

            function pararLeitor() {
                if (html5QrcodeScanner) {
                    html5QrcodeScanner.stop().then(() => {
                        html5QrcodeScanner.clear();
                        overlay.classList.remove('hidden');
                        btnStart.classList.remove('hidden');
                        btnStop.classList.add('hidden');
                        btnStop.classList.remove('flex');
                    }).catch(e => console.log(e));
                }
            }

            btnStart.addEventListener('click', iniciarLeitor);
            btnStop.addEventListener('click', pararLeitor);

            // --- Salvar na Planilha via FETCH (Agora deteta falhas reais do servidor) ---
            btnSheets.addEventListener('click', async () => {
                btnSheets.innerHTML = `<i class="ph ph-spinner ph-spin text-xl"></i> A enviar para a Planilha...`;
                btnSheets.disabled = true;

                const payload = {
                    nf: currentNumero,
                    chave: currentChave,
                    data: new Date().toLocaleString('pt-BR'),
                    fotoBase64: currentFotoBase64
                };

                try {
                    const response = await fetch(GOOGLE_SHEETS_WEBHOOK_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8'
                        }
                    });
                    
                    // Extraímos a resposta em texto do servidor para validar de verdade!
                    const textResult = await response.text();

                    if (response.ok && textResult.includes("Sucesso")) {
                         btnSheets.classList.remove('bg-[#0F9D58]', 'hover:bg-[#0b8043]');
                         btnSheets.classList.add('bg-gray-400');
                         btnSheets.innerHTML = `<i class="ph-fill ph-check-circle text-xl"></i> Salvo com Sucesso!`;
                         
                         if(currentFotoBase64) {
                             btnRemoverFoto.click();
                         }
                    } else {
                         // Se o Google não disse "Sucesso", nós lançamos o erro real na tela.
                         throw new Error(textResult || `Erro HTTP: ${response.status}`);
                    }

                } catch (error) {
                    alert("Atenção, erro no Google Sheets:\n\n" + error.message);
                    btnSheets.innerHTML = `<i class="ph-fill ph-cloud-arrow-up text-xl"></i> Tentar Novamente`;
                    btnSheets.disabled = false;
                }
            });

            btnWhatsapp.addEventListener('click', () => {
                const data = new Date().toLocaleString('pt-BR');
                let mensagem = `📦 *Recebimento de Material*\n\n✅ Mercadoria conferida.\n*NF:* ${currentNumero}\n*Chave:* ${currentChave}\n*Data:* ${data}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(mensagem)}`, '_blank');
            });
        });
    </script>
</body>
</html>
